version: "3.9"

services:
  shipnav:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: autonomous-ship-nav
    restart: unless-stopped
    ports:
      - "8080:8080"   # REST API
      - "8081:8081"   # WebSocket telemetry
    volumes:
      - ../config:/app/config:ro
      - vdr-logs:/app/data/vdr
    environment:
      - SHIP_MMSI=${SHIP_MMSI:-123456789}
      - SHIP_NAME=${SHIP_NAME:-MV AUTONOMOUS PIONEER}
      - SHIPNAV_JWT_SECRET=${SHIPNAV_JWT_SECRET:-change-me-in-production}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    container_name: shipnav-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - shipnav

  grafana:
    image: grafana/grafana:latest
    container_name: shipnav-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  vdr-logs:
    driver: local
  grafana-data:
    driver: local
